name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write # for AWS OIDC

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sakay-api
  AWS_REGION: ap-southeast-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      # QEMU for cross-building linux/arm64 on an amd64 runner.
      # The Dockerfile uses node:20-bookworm-slim (glibc) instead of alpine
      # (musl) because musl + QEMU reliably SIGILLs during npm ci with native
      # modules. When this repo goes public, switch to runs-on: ubuntu-24.04-arm
      # and drop this qemu step for ~5x faster builds.
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      # Pre-fetch OSM route data on the runner so the file lands in the Docker
      # build context. The fetch-osm-routes script checks mtime; a file that
      # was just written will be treated as a fresh cache and the in-Docker
      # Overpass call is skipped entirely. This removes the network dependency
      # from inside the Docker build layer.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Fetch OSM route data
        run: |
          npm ci --include=dev
          npm run osm:fetch

      - id: meta
        run: |
          tag="$(echo ${GITHUB_SHA} | cut -c1-12)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Pull + restart on EC2 via SSM
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          aws ssm send-command \
            --targets "Key=tag:Name,Values=sakay-api-prod-ec2" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy sakay-api ${IMAGE_TAG}" \
            --parameters "commands=[\"cd /opt/sakay\",\"docker compose --profile app pull\",\"docker compose --profile app up -d --remove-orphans\"]" \
            --region "$AWS_REGION" \
            --output text \
            --query "Command.CommandId" > /tmp/cmd_id

          cmd_id=$(cat /tmp/cmd_id)
          echo "SSM command id: ${cmd_id}"

          # Poll for completion (max ~3 min).
          for i in $(seq 1 36); do
            status=$(aws ssm list-command-invocations \
              --command-id "${cmd_id}" \
              --details \
              --region "$AWS_REGION" \
              --query "CommandInvocations[0].Status" \
              --output text)
            echo "status: ${status}"
            case "${status}" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut) exit 1 ;;
            esac
            sleep 5
          done
          echo "deploy timed out" >&2
          exit 1
