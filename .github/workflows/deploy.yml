name: deploy

on:
  push:
    branches: [main]
    paths:
      - "sakay-api/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: sakay-api

permissions:
  contents: read
  packages: write
  id-token: write # for AWS OIDC

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sakay-api
  AWS_REGION: ap-southeast-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - id: meta
        run: |
          tag="$(echo ${GITHUB_SHA} | cut -c1-12)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: sakay-api
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Pull + restart on EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.AWS_EC2_INSTANCE_ID }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy sakay-api ${IMAGE_TAG}" \
            --parameters "commands=[\"cd /opt/sakay\",\"docker compose pull\",\"docker compose up -d --remove-orphans\"]" \
            --region "$AWS_REGION" \
            --output text \
            --query "Command.CommandId" > /tmp/cmd_id

          cmd_id=$(cat /tmp/cmd_id)
          echo "SSM command id: ${cmd_id}"

          # Poll for completion (max ~3 min).
          for i in $(seq 1 36); do
            status=$(aws ssm list-command-invocations \
              --command-id "${cmd_id}" \
              --details \
              --region "$AWS_REGION" \
              --query "CommandInvocations[0].Status" \
              --output text)
            echo "status: ${status}"
            case "${status}" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut) exit 1 ;;
            esac
            sleep 5
          done
          echo "deploy timed out" >&2
          exit 1
