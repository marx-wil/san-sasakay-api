name: ci

on:
  push:
    branches: [main]
    paths:
      - "sakay-api/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "sakay-api/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: sakay-api

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sakay-api/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  build-image:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: sakay-api
          push: false
          tags: sakay-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
